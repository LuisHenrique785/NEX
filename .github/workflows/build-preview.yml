name: Build Preview (manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Plataforma"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - all

jobs:
  build:
    name: Build Preview APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview)
        run: eas build --platform ${{ inputs.platform }} --profile preview --non-interactive --no-wait
