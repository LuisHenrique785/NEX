name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:       # permite rodar manualmente pelo GitHub

jobs:
  build:
    name: Build APK (EAS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --no-wait

      - name: Mostrar link do build
        run: |
          echo "✅ Build iniciado no EAS!"
          echo "Acesse: https://expo.dev/accounts/[SEU_USUARIO]/projects/nex-inventory/builds"
          echo "O APK estará disponível em poucos minutos para download direto."
